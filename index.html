<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>time tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>time tracker</h1>
    <button id="pip">picture in picture</button>

    <div id="big-ui-container">
        <div id="big-ui">
            <div id="big-ui-time"></div>
            <div id="big-ui-task">
                <label for="big-ui-task-title">task: </label>
                <input type="text" title="big-ui-task-title" id="big-ui-task-title">
                <button id="start-button">start</button>
            </div>
            <div id="big-ui-current-task" hidden></div>

            <div id="big-ui-tracking-elems">
                <button hidden id="big-ui-end-button">end</button>
                <span id="big-ui-small-time">00:00:00</span>
                <button hidden id="big-ui-add-comment-button">add comment</button>
            </div>

            <div hidden id="big-ui-comment-box">
                <textarea placeholder="comment" id="big-ui-comment-textarea"></textarea>
                <button id="big-ui-done-comment-button">done</button>
            </div>

        </div>
    </div>
    <table id="task-done-table">
        <caption>task done</caption>
        <thead>
            <tr>
                <th>start time</th>
                <th>end time</th>
                <th>title</th>
                <th>comments</th>
                <th>time taken</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <script src="script.js"></script>
</body>

</html>
