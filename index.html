<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Time</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <button id="track-task">track</button>

    <div id="task">
        <label for="task-title">title: </label>
        <input type="text" title="task-title" id="task-title">

        <!-- <label for="task-description">description:</label>
        <textarea title="task-description" id="task-description"></textarea> -->

        <button id="start-button">start</button>
    </div>

    <button id="pip">picture in picture</button>

    <div id="big-ui">
        <div id="big-ui-time"></div>
        <div id="big-ui-task"></div>
        <div>start time: <span id="big-ui-time-start"></span></div>
        <div id="big-ui-time-diff"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
